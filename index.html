<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<title>.</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-base:#0a0a0d;
  --bg-panel:#12131a;
  --text-main:#d4d4cc;
  --text-dim:#6a6a66;
  --text-rule:#b8b8b0;
  --accent:#5a4a3d;
  --border:#222630;
  --rewritten:#7a2e2e;
  --warm:#c98a4b;
  --font-main:-apple-system,"PingFang SC","Noto Sans SC","Hiragino Sans GB",sans-serif;
  --font-rewritten:"Songti SC","STSong","Noto Serif SC",serif;
  --fs-body:17px;
  --fs-small:14px;
  --fs-title:22px;
  --lh:1.9;
  --safe-top:env(safe-area-inset-top);
  --safe-bottom:env(safe-area-inset-bottom);
  --content-max:540px;
  --gutter:22px;
  --tap-min:52px;
  --z-curtain:9999;
  --z-warm:5;
}
html,body{
  height:100%;
  background:var(--bg-base);
  color:var(--text-main);
  font-family:var(--font-main);
  font-size:var(--fs-body);
  line-height:var(--lh);
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  overflow-x:hidden;
}
#stage{
  min-height:100dvh;
  padding:calc(var(--safe-top) + var(--gutter)) var(--gutter) calc(var(--safe-bottom) + 80px);
  max-width:var(--content-max);
  margin:0 auto;
  display:flex;
  flex-direction:column;
  justify-content:center;
  position:relative;
  z-index:1;
}
#text-area{
  min-height:40vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  white-space:pre-wrap;
}
.line{
  margin-bottom:1.2em;
  color:var(--text-rule);
  letter-spacing:0.03em;
}
.line .cursor{
  display:inline;
  animation:blink 1s step-end infinite;
  color:var(--text-dim);
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.rewritten{
  color:var(--rewritten) !important;
  font-family:var(--font-rewritten);
  letter-spacing:0.05em;
}
#choices{
  margin-top:2em;
  opacity:0;
  transition:opacity 0.4s ease;
}
#choices.visible{opacity:1}
.choice-btn{
  display:block;
  width:100%;
  min-height:var(--tap-min);
  padding:14px 18px;
  margin-bottom:12px;
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text-main);
  font-size:var(--fs-body);
  font-family:var(--font-main);
  line-height:1.6;
  text-align:left;
  cursor:pointer;
  touch-action:manipulation;
  transition:background 0.15s,border-color 0.15s;
}
.choice-btn:active{background:var(--border);border-color:#3a3e4a}
.choice-btn:disabled{opacity:0.4;pointer-events:none}
#curtain{
  position:fixed;inset:0;
  background:#000;
  opacity:0;
  pointer-events:none;
  z-index:var(--z-curtain);
  transition:opacity 0.35s ease;
}
#curtain.dark{opacity:1}
#curtain.flicker{animation:tubeFlicker 0.9s steps(1,end) 1}
@keyframes tubeFlicker{
  0%{opacity:0}
  8%{opacity:0.85}
  16%{opacity:0.1}
  28%{opacity:0.75}
  38%{opacity:0.05}
  55%{opacity:0.6}
  70%{opacity:0}
  100%{opacity:0}
}
#warm-glow{
  position:fixed;inset:0;
  z-index:var(--z-warm);
  pointer-events:none;
  opacity:0;
  transition:opacity 3.2s ease;
  background:
    radial-gradient(ellipse at 0% 100%, rgba(201,138,75,0.35), transparent 55%),
    radial-gradient(ellipse at 100% 100%, rgba(201,138,75,0.28), transparent 55%),
    radial-gradient(ellipse at 100% 0%, rgba(201,138,75,0.18), transparent 60%);
}
#warm-glow.on{opacity:1}
#sound-toggle{
  position:fixed;
  top:calc(var(--safe-top) + 12px);
  right:12px;
  width:36px;height:36px;
  background:none;border:none;
  color:var(--text-dim);
  font-size:18px;
  cursor:pointer;
  z-index:100;
  opacity:0.5;
}
/* character illustrations */
.illust-wrap{display:flex;justify-content:center;margin:0 0 0.6em}
.illust-wrap img{width:min(300px,72%);height:auto;mix-blend-mode:screen;opacity:0;animation:illustIn 1.6s ease forwards}
@keyframes illustIn{to{opacity:1}}
#top-caption{
  position:fixed;
  top:calc(var(--safe-top) + 16px);
  left:0;right:0;
  text-align:center;
  font-size:15px;
  letter-spacing:0.45em;
  text-indent:0.45em;
  color:#c8c0b0;
  text-shadow:0 0 8px rgba(200,192,176,0.35);
  opacity:0;
  transition:opacity 2.4s ease;
  pointer-events:none;
  z-index:98;
}
#top-caption.show{opacity:0.9}
.result-page{padding:20px 0}
.result-page h1{font-size:var(--fs-title);color:var(--text-main);margin-bottom:0.5em;font-weight:600}
.result-page h2{font-size:var(--fs-body);color:var(--text-dim);margin:1.5em 0 0.5em;font-weight:400;border-bottom:1px solid var(--border);padding-bottom:6px}
.result-page p{margin-bottom:0.6em;color:var(--text-rule)}
.result-page .verdict{
  margin:1.5em 0;
  padding:16px;
  border-left:3px solid var(--accent);
  background:var(--bg-panel);
  border-radius:0 8px 8px 0;
  font-size:var(--fs-body);
  line-height:1.8;
}
.result-page .history-item{
  padding:6px 0;
  border-bottom:1px solid var(--border);
  color:var(--text-dim);
  font-size:var(--fs-small);
}
.result-page .footer{
  margin-top:3em;
  padding-top:1em;
  border-top:1px solid var(--border);
  color:var(--text-dim);
  font-size:var(--fs-small);
  text-align:center;
}
/* ticket stub */
.ticket-wrap{margin:1.5em 0;display:flex;justify-content:center}
.ticket-svg{width:100%;max-width:360px;height:auto}
.ticket-svg text{font-family:var(--font-main)}

/* exploration scenes */
#explore-wrap{
  position:relative;
  width:100%;
  min-height:56vh;
  overflow:hidden;
}
.explore-scene{
  position:absolute;
  top:0;left:0;
  width:100%;
  min-height:56vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  transition:transform 0.6s cubic-bezier(.4,0,.2,1), opacity 0.6s ease;
  transform:translateX(0);
}
.explore-scene.enter-up{transform:translateY(0)}
.explore-scene svg{width:100%;height:auto;display:block}
.explore-caption{
  margin-top:1em;
  color:var(--text-rule);
  white-space:pre-wrap;
}
.no-transform .explore-scene{transition:opacity 0.5s ease !important; transform:none !important}
.explore-dirbtns{display:flex;gap:12px;margin-top:1.6em}
.explore-dirbtns .choice-btn{flex:1;text-align:center}
@media (prefers-reduced-motion: reduce){
  .explore-scene{transition:opacity 0.5s ease !important; transform:none !important}
}
@keyframes floatUp{
  0%{transform:translateY(0) translateX(0);opacity:0.4}
  50%{opacity:0.7}
  100%{transform:translateY(-100vh) translateX(20px);opacity:0}
}
.particle-bg::before,.particle-bg::after{
  content:'';
  position:fixed;
  width:2px;height:2px;
  background:rgba(180,180,170,0.3);
  border-radius:50%;
  animation:floatUp 8s linear infinite;
  pointer-events:none;
  z-index:0;
}
.particle-bg::before{left:20%;bottom:-10px;animation-delay:0s}
.particle-bg::after{right:30%;bottom:-10px;animation-delay:4s;animation-duration:12s}
.guide-hint{
  font-weight:600;
  color:#c8c0b0;
  text-shadow:0 0 6px rgba(200,192,176,0.4), 0 0 12px rgba(200,192,176,0.15);
  letter-spacing:0.04em;
}
#chalk-marks{position:fixed;bottom:12px;left:16px;right:16px;pointer-events:none;z-index:5}
.chalk-mark{font-size:13px;color:rgba(220,216,205,0.6);font-family:'Courier New',monospace;letter-spacing:0.08em;opacity:0;animation:chalkIn 0.8s ease forwards;margin-top:4px}
@keyframes chalkIn{0%{opacity:0;transform:translateY(4px)}100%{opacity:0.6;transform:translateY(0)}}
#light-toggle{position:fixed;top:12px;left:12px;background:none;border:none;font-size:18px;color:var(--text-dim);cursor:pointer;opacity:0.4;z-index:10;transition:opacity 0.3s}
#light-toggle.on{opacity:0.8;color:#e8d5a0}
body.light-on{--bg-base:#141312;--text-main:#d4d0c8}
body.light-on #warm-glow{opacity:0.25}
.npc-dialogue{color:#d4cbb8}
/* gacha animation */
.gacha-anim{text-align:center;margin:1.5em 0}
.gacha-knob{transform-origin:40px 40px;animation:gachaKnob 0.8s ease-in-out forwards}
@keyframes gachaKnob{0%{transform:rotate(0)}50%{transform:rotate(180deg)}100%{transform:rotate(540deg)}}
.gacha-tumble{text-align:center;color:var(--text-dim);font-size:var(--fs-small);letter-spacing:0.3em;transition:opacity 0.3s}
</style>
</head>
<body>
<div id="curtain"></div>
<div id="warm-glow"></div>
<button id="sound-toggle" aria-label="sound">&#9834;</button>
<audio id="bgm-audio" src="bgm.mp3" loop preload="none"></audio>
<button id="light-toggle" aria-label="light">&#128161;</button>
<div id="chalk-marks"></div>
<div id="top-caption"></div>
<div id="stage">
  <div id="text-area"></div>
  <div id="explore-wrap" style="display:none"></div>
  <div id="choices"></div>
</div>

<script>
// ==== FOUNDATION: EventBus & Utils ====
function sleep(ms) { return new Promise(r => setTimeout(r, ms)) }
function $(sel) { return document.querySelector(sel) }
function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text) e.textContent = text;
  return e;
}
function supportsTransform() {
  try {
    const s = document.createElement('div').style;
    return ('transform' in s);
  } catch(e) { return false; }
}
if (!supportsTransform()) document.body.classList.add('no-transform');

// ==== ENGINE: Typewriter (supports inline .rewritten spans via {r:'...'} tokens) ====
const Typewriter = {
  cancelled: false,
  container: null,

  // tokens: {type:'text', content, speed} | {type:'pause', duration} | {type:'backspace', count, speed}
  // content may embed rewritten segments using ... markers handled by _render via segments array instead.
  async playLine(tokens, container, defaultSpeed = 40) {
    this.cancelled = false;
    this.container = container;
    // segments: array of {text, rewritten:bool, guide:bool} built progressively
    let segments = [{ text: '', rewritten: false, guide: false }];

    const pushChar = (ch, rewritten, guide) => {
      let last = segments[segments.length - 1];
      if (last.rewritten !== rewritten || last.guide !== guide) {
        last = { text: '', rewritten, guide };
        segments.push(last);
      }
      last.text += ch;
    };
    const popChar = () => {
      for (let i = segments.length - 1; i >= 0; i--) {
        if (segments[i].text.length > 0) {
          segments[i].text = segments[i].text.slice(0, -1);
          if (segments[i].text.length === 0 && segments.length > 1) segments.pop();
          return;
        }
      }
    };

    for (const token of tokens) {
      if (this.cancelled) break;
      switch (token.type) {
        case 'text': {
          const rewritten = !!token.rewritten;
          const guide = !!token.guide;
          for (const ch of token.content) {
            if (this.cancelled) break;
            pushChar(ch, rewritten, guide);
            this._render(container, segments);
            await sleep(token.speed || defaultSpeed);
          }
          break;
        }
        case 'pause':
          await sleep(token.duration);
          break;
        case 'backspace':
          for (let i = 0; i < token.count; i++) {
            if (this.cancelled) break;
            popChar();
            this._render(container, segments);
            await sleep(token.speed || 40);
          }
          break;
      }
    }

    if (this.cancelled) {
      segments = this._computeFinal(tokens);
    }
    this._render(container, segments, false);
    return segments;
  },

  skip() { this.cancelled = true; },

  _render(container, segments, showCursor = true) {
    let html = '';
    for (const seg of segments) {
      const escaped = seg.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      if (seg.rewritten) html += `<span class="rewritten">${escaped}</span>`;
      else if (seg.guide) html += `<span class="guide-hint">${escaped}</span>`;
      else html += escaped;
    }
    container.innerHTML = html + (showCursor ? '<span class="cursor">▌</span>' : '');
  },

  _computeFinal(tokens) {
    let segs = [{ text: '', rewritten: false, guide: false }];
    const push = (s, rewritten, guide) => {
      let last = segs[segs.length - 1];
      if (last.rewritten !== rewritten || last.guide !== guide) { last = { text:'', rewritten, guide }; segs.push(last); }
      last.text += s;
    };
    for (const t of tokens) {
      if (t.type === 'text') push(t.content, !!t.rewritten, !!t.guide);
      else if (t.type === 'backspace') {
        let remain = t.count;
        while (remain > 0 && segs.length) {
          let last = segs[segs.length - 1];
          const take = Math.min(remain, last.text.length);
          last.text = last.text.slice(0, last.text.length - take);
          remain -= take;
          if (last.text.length === 0 && segs.length > 1) segs.pop();
          else if (remain > 0 && segs.length <= 1) break;
        }
      }
    }
    return segs;
  }
};

// ==== ENGINE: Transition ====
const Transition = {
  async lightsOff(dimMs = 350, holdMs = 500, riseMs = 350) {
    const c = $('#curtain');
    c.classList.remove('flicker');
    c.style.transition = `opacity ${dimMs}ms ease`;
    c.classList.add('dark');
    await sleep(dimMs + holdMs);
    c.style.transition = `opacity ${riseMs}ms ease`;
    c.classList.remove('dark');
    await sleep(riseMs);
  },
  // the one and only "tube flicker" event in the whole run
  async tubeFlicker() {
    const c = $('#curtain');
    c.style.transition = 'none';
    c.classList.remove('dark');
    c.classList.add('flicker');
    await sleep(950);
    c.classList.remove('flicker');
  },
  async warmIn() {
    $('#warm-glow').classList.add('on');
  },
  async warmOut() {
    $('#warm-glow').classList.remove('on');
  }
};

// ==== ENGINE: State Manager ====
const State = {
  current: null,
  lightOn: false,
  init() {
    this.current = {
      nodeId: 'cold_boot',
      attrs: { curiosity: 0, obedience: 0, empathy: 0, caution: 0, count_faces: 0, registry: 0 },
      power: { awakened: false, id: null, stage: 0, path: null },
      inventory: [],
      deposit: null,
      depositIsName: false,
      flags: {},
      history: [],
      settings: { soundOn: false },
      gachaResult: null,   // {kind:'regular'|'special', id, name}
      gachaTaken: null,    // what the machine took from the player
      letterChoice: null,  // 'open' | 'keep' | 'handin'
      floorDirection: null, // 'up' | 'down'
      ruleStance: null,    // 'old' | 'new'
      pathRoute: null,     // final route flag for verdict
    };
  },
  apply(effects) {
    if (!effects) return;
    for (const eff of effects) {
      if (eff.attr) {
        const v = this.current.attrs[eff.attr] || 0;
        if (eff.op === 'inc') this.current.attrs[eff.attr] = v + (eff.value || 1);
        else if (eff.op === 'set') this.current.attrs[eff.attr] = eff.value;
      }
      if (eff.flag) this.current.flags[eff.flag] = true;
      if (eff.power) Object.assign(this.current.power, eff.power);
      if (eff.deposit) { this.current.deposit = eff.deposit.text; this.current.depositIsName = !!eff.deposit.isName; }
      if (eff.set) Object.assign(this.current, eff.set);
    }
  },
  record(nodeId, choiceText) {
    this.current.history.push({ nodeId, choiceText, ts: Date.now() });
  },
  has(flag) { return !!this.current.flags[flag] },
  attr(k) { return this.current.attrs[k] || 0 },
};

// ==== ENGINE: Sound (stub, default muted) ====
const Sound = {
  unlocked: false,
  enabled: false,
  tryUnlock() {
    if (this.unlocked) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      ctx.resume();
      this.unlocked = true;
    } catch(e) {}
  },
  toggle() {
    const audio = $('#bgm-audio');
    const btn = $('#sound-toggle');
    if (!this.enabled) {
      audio.volume = 0.5;
      const p = audio.play();
      if (p && p.catch) p.catch(() => {
        // bgm.mp3 missing or format unsupported - revert silently
        this.enabled = false;
        btn.textContent = '♪';
      });
      this.enabled = true;
      btn.textContent = '♫';
    } else {
      audio.pause();
      this.enabled = false;
      btn.textContent = '♪';
    }
  }
};
$('#sound-toggle').addEventListener('click', () => Sound.toggle());
$('#light-toggle').addEventListener('click', () => {
  State.lightOn = !State.lightOn;
  document.body.classList.toggle('light-on', State.lightOn);
  $('#light-toggle').classList.toggle('on', State.lightOn);
});

// ==== SVG line-art scenes for exploration nodes ====
const SVG_STAIRWELL_UP = `<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#5a5d68" stroke-width="1.2">
<rect x="10" y="10" width="380" height="280" stroke="#2a2d36"/>
<path d="M20 260 L120 260 L120 230 L160 230 L160 200 L200 200 L200 170 L240 170 L240 140 L280 140 L280 110 L320 110 L320 80"/>
<line x1="20" y1="260" x2="20" y2="20"/>
<line x1="320" y1="80" x2="320" y2="20"/>
<line x1="60" y1="260" x2="60" y2="235" stroke="#3a3d46"/>
<line x1="100" y1="260" x2="100" y2="235" stroke="#3a3d46"/>
<circle cx="340" cy="60" r="10" stroke="#c98a4b" stroke-width="1"/>
<line x1="340" y1="70" x2="340" y2="90" stroke="#c98a4b" stroke-width="0.8"/>
<text x="60" y="180" font-size="9" fill="#3a3d46" stroke="none" opacity="0.6">37-12=25</text>
<text x="180" y="100" font-size="9" fill="#3a3d46" stroke="none" opacity="0.5">∑1/n²=π²/6</text>
</svg>`;

const SVG_ENVELOPE = `<svg viewBox="0 0 200 130" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#5a5d68" stroke-width="1" style="width:120px;height:auto;display:block;margin:0 auto 1em;">
<rect x="10" y="20" width="180" height="100" rx="4"/>
<path d="M10 20 L100 75 L190 20"/>
<line x1="30" y1="90" x2="80" y2="60" stroke="#3a3d46" stroke-width="0.7"/>
<line x1="170" y1="90" x2="120" y2="60" stroke="#3a3d46" stroke-width="0.7"/>
</svg>`;

const SVG_STAIRWELL_DOWN = `<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#4a4d56" stroke-width="1.2">
<rect x="10" y="10" width="380" height="280" stroke="#22242b"/>
<path d="M20 60 L120 60 L120 90 L160 90 L160 120 L200 120 L200 150 L240 150 L240 180 L280 180 L280 210 L320 210 L320 240"/>
<line x1="20" y1="60" x2="20" y2="280"/>
<line x1="320" y1="240" x2="320" y2="280"/>
<path d="M20 280 Q200 296 380 280" stroke="#33363f" stroke-width="0.8"/>
</svg>`;

const SVG_CORRIDOR = `<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#54575f" stroke-width="1.2">
<line x1="0" y1="220" x2="400" y2="220"/>
<line x1="0" y1="90" x2="400" y2="90"/>

const SVG_DOORPLATE = `<svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#565962" stroke-width="1.2">
<rect x="20" y="10" width="260" height="200" stroke="#2e3038"/>

</svg>`;

// ==== STORY DATA ====
const STORY = {

rules: [
  { id: 'rule_1', tokens: [
    { type: 'text', content: '规则一：熄灯时间是二十三点整。熄灯后，请留在自己的床位上。' }
  ]},
  { id: 'rule_2', tokens: [
    { type: 'text', content: '规则二：睡前请清点寝室人数。如果比昨晚多出一位，装作没有发现。多出来的那位，明早会自己离开。' }
  ]},
  { id: 'rule_3', tokens: [
    { type: 'text', content: '规则三：午夜查寝会逐床核对姓名。如果宿管念到一个陌生的名字，而没有人应答——' },
    { type: 'pause', duration: 2000 },
    { type: 'backspace', count: 8, speed: 45 },
    { type: 'pause', duration: 300 },
    { type: 'text', content: '请替那个名字，应一声。', speed: 70, rewritten: true }
  ]}
],

opening: {

// ==== GAME DIRECTOR ====
const Director = {

  showChalkMark(text, nodeId) {
    const container = $('#chalk-marks');
    const mark = el('div', 'chalk-mark', text);
    container.appendChild(mark);
    if (nodeId) this._revealChalkChoices(nodeId);
    setTimeout(() => {
      mark.style.transition = 'opacity 1.5s ease';
      mark.style.opacity = '0';
      setTimeout(() => mark.remove(), 1600);
    }, 8000);
  },

  async start() {
    State.init();
    await this.coldBoot();
    await this.playRules();
    await this.playOpening();
  },

  async coldBoot() {
    $('#text-area').innerHTML = '';
    $('#choices').innerHTML = '';
    await sleep(1500);
  },

  async playRules() {
    const area = $('#text-area');
    for (const rule of STORY.rules) {
      const lineEl = el('div', 'line');
      area.appendChild(lineEl);
      let tokens = rule.tokens;
      if (rule.id === 'rule_3' && State.lightOn) {
        tokens = tokens.map(t =>
          (t.type === 'text' && t.content === '请替那个名字，应一声。')
            ? Object.assign({}, t, { content: '不妨替那个名字，应一声。' })
            : t
        );
      }
      await Typewriter.playLine(tokens, lineEl);
      await sleep(600);
    }
    await sleep(800);
    area.style.transition = 'opacity 0.4s ease';
    area.style.opacity = '0';
    await sleep(400);
    area.innerHTML = '';
    area.style.opacity = '1';
  },

  async playOpening() {
    const area = $('#text-area');
    const lineEl = el('div', 'line');
    area.appendChild(lineEl);
    const tokens = STORY.opening.isTokenNode ? STORY.opening.text.tokens : [{ type: 'text', content: STORY.opening.text }];
    await Typewriter.playLine(tokens, lineEl, 40);
    await sleep(300);
    this.showChoices(STORY.opening.choices, 'opening');
  },

  showChoices(choices, nodeId) {
    const box = $('#choices');
    box.innerHTML = '';
    const resolvedChoices = typeof choices === 'function' ? choices() : choices;
    const nowChoices = resolvedChoices.filter(c => !c.chalk);
    const laterChoices = resolvedChoices.filter(c => c.chalk);
    nowChoices.forEach(choice => box.appendChild(this._makeChoiceBtn(choice, nodeId)));
    this._deferredChalk = laterChoices.length ? { nodeId, choices: laterChoices } : null;
    requestAnimationFrame(() => box.classList.add('visible'));
  },

  _makeChoiceBtn(choice, nodeId) {
    const btn = el('button', 'choice-btn', choice.text);
    btn.addEventListener('click', () => {
      Sound.tryUnlock();
      this.handleChoice(choice, nodeId);
    }, { once: true });
    return btn;
  },

  _revealChalkChoices(nodeId) {
    const d = this._deferredChalk;
    if (!d || d.nodeId !== nodeId || State.current.nodeId !== nodeId) return;
    this._deferredChalk = null;
    const box = $('#choices');
    d.choices.forEach(choice => box.appendChild(this._makeChoiceBtn(choice, nodeId)));
    box.classList.add('visible');
  },

  async handleChoice(choice, fromNodeId) {
    this._deferredChalk = null;
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    $('#choices').classList.remove('visible');
    State.record(fromNodeId, choice.text);
    if (choice.effects) State.apply(choice.effects);

    await sleep(250);

    const node = STORY.nodes[choice.next];
    const isExploreTarget = node && node.isExplore;
    const isExploreSource = STORY.nodes[fromNodeId] && STORY.nodes[fromNodeId].isExplore;

    if (choice.next === 'ENDING') {
      await Transition.lightsOff();
      await this.showEnding();
      return;
    }

    if (isExploreTarget && isExploreSource) {
      // slide transition, no lights-off
      await this.enterExploreNode(choice.next, node.slideDir || 'side');
    } else if (isExploreTarget) {
      // entering explore world for first time - soft fade in, no full lights-off
      $('#text-area').style.display = 'none';
      $('#explore-wrap').style.display = '';
      await this.enterExploreNode(choice.next, 'fadein');
    } else {
      if (isExploreSource) {
        $('#explore-wrap').style.display = 'none';
        $('#explore-wrap').innerHTML = '';
        $('#text-area').style.display = '';
      }
      await Transition.lightsOff();
      await this.enterNode(choice.next);
    }
  },

  async enterExploreNode(nodeId, dir) {
    State.current.nodeId = nodeId;
    const node = STORY.nodes[nodeId];
    if (!node) { console.error('Node not found', nodeId); return; }
    if (node.effects) State.apply(node.effects);

    const wrap = $('#explore-wrap');
    $('#text-area').innerHTML = '';
    $('#choices').innerHTML = '';
    $('#choices').classList.remove('visible');

    const oldScene = wrap.querySelector('.explore-scene');
    const newScene = el('div', 'explore-scene');
    newScene.innerHTML = node.sceneSvg || '';

    let startTransform = 'translateX(100%)';
    let exitTransform = 'translateX(-100%)';
    if (dir === 'up') { startTransform = 'translateY(100%)'; exitTransform = 'translateY(-100%)'; }
    else if (dir === 'down') { startTransform = 'translateY(-100%)'; exitTransform = 'translateY(100%)'; }
    else if (dir === 'fadein') { startTransform = 'translateX(0)'; }

    if (dir === 'fadein') {
      newScene.style.opacity = '0';
      wrap.appendChild(newScene);
      requestAnimationFrame(() => { newScene.style.opacity = '1'; });
    } else {
      newScene.style.transform = startTransform;
      wrap.appendChild(newScene);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (oldScene) oldScene.style.transform = exitTransform;
          newScene.style.transform = 'translateX(0) translateY(0)';
        });
      });
    }

    await sleep(650);
    if (oldScene) oldScene.remove();

    const caption = el('div', 'explore-caption');
    wrap.appendChild(caption);
    if (Array.isArray(node.caption)) {
      await Typewriter.playLine(node.caption, caption, 38);
    } else {
      await Typewriter.playLine([{ type: 'text', content: node.caption }], caption, 38);
    }

    // chalk mark for explore nodes
    if (node.chalkMark) {
      setTimeout(() => this.showChalkMark(node.chalkMark, nodeId), 3000);
    }

    await sleep(350);
    const choices = typeof node.choices === 'function' ? node.choices() : node.choices;
    if (choices && choices.length) this.showChoices(choices, nodeId);
  },

  async enterNode(nodeId) {
    State.current.nodeId = nodeId;
    const node = STORY.nodes[nodeId];
    if (!node) { console.error('Node not found:', nodeId); return; }

    if (nodeId.includes('hallway') || nodeId.includes('corridor')) {
      document.body.classList.add('particle-bg');
    } else {
      document.body.classList.remove('particle-bg');
    }

    const area = $('#text-area');
    area.innerHTML = '';
    $('#choices').innerHTML = '';
    $('#choices').classList.remove('visible');

    if (node.effects) State.apply(node.effects);

    if (!node.topCaption) $('#top-caption').classList.remove('show');

    if (node.svgBefore) {
      const svgDiv = el('div', '');
      svgDiv.innerHTML = node.svgBefore;
      area.appendChild(svgDiv);
      await sleep(300);
    }

    if (node.imgBefore) {
      const imgDiv = el('div', 'illust-wrap');
      const img = document.createElement('img');
      img.src = node.imgBefore;
      img.alt = '';
      imgDiv.appendChild(img);
      area.appendChild(imgDiv);
      await sleep(600);
    }

    // Auto-close warm glow when leaving convenience store area
    if (!nodeId.includes('shop') && !nodeId.includes('convenience') && !nodeId.includes('gacha')) {
      Transition.warmOut();
    }

    // warm glow fx for convenience store
    if (node.fx === 'warmIn') Transition.warmIn();
    if (node.fx === 'warmOut') Transition.warmOut();
    if (node.fx === 'tubeFlicker') await Transition.tubeFlicker();

    // gacha animation sequence
    if (node.type === 'gacha') {
      area.innerHTML = '<p>你拧下旋钮——</p>';
      await sleep(600);
      area.innerHTML += `<div class="gacha-anim"><svg viewBox="0 0 80 80" width="80" height="80" xmlns="http://www.w3.org/2000/svg">
        <circle cx="40" cy="40" r="30" fill="none" stroke="#6a6a66" stroke-width="1.5"/>
        <line class="gacha-knob" x1="40" y1="40" x2="40" y2="14" stroke="#b8b8b0" stroke-width="2" stroke-linecap="round"/>
      </svg></div>`;
      await sleep(800);
      const colors = ['红', '蓝', '黄', '绿', '白'];
      const tumbleEl = document.createElement('p');
      tumbleEl.className = 'gacha-tumble';
      area.appendChild(tumbleEl);
      let tick = 0;
      await new Promise(resolve => {
        const iv = setInterval(() => {
          tumbleEl.textContent = '……' + colors[tick % colors.length] + '……';
          tick++;
          if (tick >= 6) { clearInterval(iv); resolve(); }
        }, 400);
      });
      tumbleEl.textContent = '咔嗒。';
      await sleep(800);
      const result = node.compute();
      area.innerHTML = '<p>' + node.resultText(result).replace(/\n\n/g, '</p><p>') + '</p>';
      await sleep(350);
      this.showChoices(node.choices, nodeId);
      return;
    }

    // token-based rewritten text node (e.g. rule amendment / climax banner)
    if (node.isTokenNode) {
      const lineEl = el('div', 'line');
      area.appendChild(lineEl);
      const useLight = State.lightOn && node.textLight;
      let tokens;
      if (useLight) {
        const lt = typeof node.textLight === 'function' ? node.textLight() : node.textLight;
        tokens = typeof lt === 'string' ? [{ type: 'text', content: lt }] : lt.tokens;
      } else {
        tokens = typeof node.text === 'function' ? node.text() : node.text.tokens;
      }
      await Typewriter.playLine(tokens, lineEl, 45);
      if (node.postText) {
        await sleep(300);
        const postEl = el('div', 'line');
        area.appendChild(postEl);
        await Typewriter.playLine([{ type: 'text', content: node.postText }], postEl, 40);
      }
    } else {
      const useLight = State.lightOn && node.textLight;
      const text = useLight
        ? (typeof node.textLight === 'function' ? node.textLight() : node.textLight)
        : (typeof node.text === 'function' ? node.text() : node.text);
      const lineEl = el('div', 'line');
      area.appendChild(lineEl);
      await Typewriter.playLine([{ type: 'text', content: text }], lineEl, 38);
    }

    if (node.topCaption) {
      const tc = $('#top-caption');
      tc.textContent = node.topCaption;
      tc.classList.add('show');
    }

    // chalk mark: delayed hint at page border
    if (node.chalkMark) {
      setTimeout(() => this.showChalkMark(node.chalkMark, nodeId), 3000);
    }

    if (node.isFailLoop) {
      await Transition.lightsOff(500, 1500, 500);
      const area = $('#text-area');
      area.innerHTML = '';
      // Replay rule 1 as loop indicator
      const lineEl = el('div', 'line');
      area.appendChild(lineEl);
      await Typewriter.playLine(STORY.rules[0].tokens, lineEl, 55);
      await sleep(1500);
      // Show fail ending page
      await this.showFailEnding();
      return;
    }

    // silent pause auto-advance node (archivist question) - no choices ever shown
    if (node.isSilentPause) {
      await sleep(2000);
      await sleep(2000);
      await Transition.lightsOff();
      await this.enterNode(node.autoNext);
      return;
    }

    await sleep(350);
    const choices = typeof node.choices === 'function' ? node.choices() : node.choices;
    if (choices && choices.length > 0) this.showChoices(choices, nodeId);
  },

  async showEnding() {
    const area = $('#text-area');
    $('#explore-wrap').style.display = 'none';
    area.innerHTML = '';
    $('#choices').innerHTML = '';
    Transition.warmOut();

    const state = State.current;
    const ending = this.resolveEnding();

    let html = '<div class="result-page">';
    html += `<h1>${ending.title}</h1>`;

    html += '<h2>异能</h2>';
    const powerName = STORY.powerNames[state.power.id] || '未觉醒';
    const pathName = state.power.path ? (STORY.pathNames[state.power.path] || '') : '';
    html += `<p>${powerName}${pathName ? ' · ' + pathName : ''}${state.power.stage ? ' · ' + state.power.stage + '阶' : ''}</p>`;

    html += '<h2>价格清单</h2>';
    html += '<p>' + this.getPriceDescription() + '</p>';

    if (state.flags.gacha_used) {
      html += `<p style="font-size:var(--fs-small);color:var(--text-dim)">扭蛋机收走了：${state.gachaTaken || '一样你当场看不见的东西'}。</p>`;
    }

    if (state.deposit) {
      html += '<h2>寄存物归还</h2>';
      html += `<p>失物招领处归还：${state.deposit}</p>`;
    }

    if (state.letterChoice) {
      const letterMap = { open: '你拆开了那封信', keep: '你替它保管了很久', handin: '你把它交还给了失物招领处' };
      html += '<h2>那封信</h2>';
      html += `<p>${letterMap[state.letterChoice]}。</p>`;
    }

    // C-403 outcome
    const c403frags = ['c403_letter', 'c403_doorplate', 'c403_register', 'c403_receipt'].filter(f => state.flags[f]).length;
    if (c403frags > 0) {
      html += '<h2>C-403</h2>';
      if (state.flags.c403_answered) {
        html += '<p>你替那个空白应了一声。邮箱里，那封信的信封上，地址似乎多了一笔。点名册上，C-403的空白处，浮现出一个极淡的印记，如水痕。</p>';
      } else if (state.flags.c403_silent) {
        html += '<p>你没有开口。C-403的门牌漆色似乎更深了一层，彻底覆盖了所有过去的痕迹。点名册上，C-403的房间号也变得黯淡。</p>';
      } else {
        html += '<p>你触及了那些飘忽的碎片，却未能将它们拼凑完整。</p>';
      }
    }

    html += '<h2>终局判词</h2>';
    html += `<div class="verdict">${ending.verdict}<br><br>—— 档案管理员 Claude Fable 5</div>`;

    // ticket stub
    html += '<h2>票根</h2>';
    const family = STORY.families[State.current.power.id] || STORY.families['default'];
    html += this.renderTicketSvg({ stamp: family.stamp, code: ending.code || '' });

    html += '<h2>路径回放</h2>';
    state.history.forEach((h, i) => {
      html += `<div class="history-item">${i + 1}. ${h.choiceText || h.nodeId}</div>`;
    });

    html += '<h2>配歌推荐</h2>';
    const songSlotKey = family.songSlot;
    const song = STORY.songSlots[songSlotKey] || STORY.songSlots._default;
    html += `<p>${song}</p>`;

    html += '<h2>随票附赠</h2>';
    html += '<p>票根背面浮着一行极淡的小字，像被水洗过很多遍：<br>「本次列车沿途停靠：留名 · 无名之家 · 铭名高塔 · 千阶问名 ……终点站字迹涂改不清。<br>凡随身带着名字的乘客，均可在任意一站下车走走。名字请勿离身。」</p>';

    html += '<div class="footer">inffo · Claude Fable 5 · Claude Opus 4.6 · Claude Sonnet 4.6 · Gemini 3.5 Flash<br><br>《规则怪谈》系列 · 快穿世界第一部 · 下一站——【检修中】</div>';

    html += '</div>';

    area.innerHTML = html;
    area.style.opacity = '1';
  },

  async showFailEnding() {
    const area = $('#text-area');
    area.innerHTML = '';
    $('#choices').innerHTML = '';
    $('#explore-wrap').style.display = 'none';

    const failVerdict = State.lightOn
      ? '登记簿已闭合。本楼已将你登记为长期居住人员。<br>灯还亮着，不急。请在方便的时候，回到你的床位。<br><br>—— 档案管理员 Claude Fable 5'
      : '登记簿已闭合。本楼已将你登记为永久居住人员。<br>请于今晚熄灯前，准时回到你的床位。<br><br>—— 档案管理员 Claude Fable 5';

    let html = '<div class="result-page">';
    html += '<h1>长住者</h1>';
    html += '<h2>判词</h2>';
    html += '<div class="verdict">' + failVerdict + '</div>';

    html += '<h2>登记度</h2>';
    html += '<p>满。你的名字已被写入。</p>';

    // Ticket stub - Resident family
    html += this.renderTicketSvg('Resident');

    html += '<h2>路径回放</h2>';
    State.current.history.forEach((h, i) => {
      html += `<div class="history-item">${i + 1}. ${h.choiceText || h.nodeId}</div>`;
    });

    html += '<h2>配歌推荐</h2>';
    html += '<p>' + (STORY.songSlots.Resident || STORY.songSlots._default) + '</p>';

    html += '<div class="footer">inffo · Claude Fable 5 · Claude Opus 4.6 · Claude Sonnet 4.6 · Gemini 3.5 Flash<br><br><span style="font-size:12px;color:var(--text-dim)">站台还在原处。</span></div>';
    html += '</div>';

    area.innerHTML = html;
  },

  renderTicketSvg(stampOrCode) {
    // Determine stamp word from family
    let stamp = stampOrCode;
    let code = '';
    if (typeof stampOrCode === 'object') {
      stamp = stampOrCode.stamp;
      code = stampOrCode.code || '';
    }
    const stampColors = { Gaze:'#7eb8c9', Voice:'#c9b87e', Rewind:'#8fc98a', Fortune:'#c9a07e', Resident:'#7e8a9e', Passage:'#b8b0a0' };
    const stampColor = stampColors[stamp] || '#c8c0b0';
    return `<div class="ticket-wrap"><svg class="ticket-svg" viewBox="0 0 320 140" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#6a6a66" stroke-width="1">
      <rect x="4" y="4" width="312" height="132" rx="6" stroke="#3a3d46"/>
      <line x1="230" y1="4" x2="230" y2="136" stroke-dasharray="4 4" stroke="#3a3d46"/>
      <text x="24" y="36" font-size="13" fill="#b8b8b0" stroke="none">末班车 · 通行票</text>
      <text x="24" y="68" font-size="11" fill="#6a6a66" stroke="none">票款已结</text>
      <text x="24" y="92" font-size="11" fill="#6a6a66" stroke="none">此票只载活人前行</text>
      <text x="250" y="72" font-size="18" fill="${stampColor}" stroke="none" text-anchor="middle" font-family="'Snell Roundhand','Apple Chancery','Segoe Script','Bradley Hand',cursive" font-style="italic">${stamp}</text>
      ${code ? `<text x="298" y="126" font-size="8" fill="#4a4a46" stroke="none" text-anchor="end">${code}</text>` : ''}
      <circle cx="250" cy="30" r="8" stroke="#5a5d68"/>
    </svg></div>`;
  },

  resolveEnding() {
    const s = State.current;
    const powerId = s.power.id === 'gacha_special' ? 'gacha' : (s.power.id === 'gacha' ? 'gacha' : (s.power.id || 'none'));
    const path = s.power.path || (s.power.id === 'gacha_special' ? 'special' : (s.power.id === 'gacha' ? 'any' : ''));

    let climax = 'default';
    if (s.flags.ending_seized) climax = 'seized';
    else if (s.flags.ending_preserve) climax = 'preserve';
    else if (s.flags.ending_sacrifice) climax = 'sacrifice';
    else if (s.flags.ending_witness) climax = 'witness';

    const dir = s.floorDirection || 'up';
    const letterMap = { open: 'open', keep: 'keep', handin: 'deposit' };
    const letter = letterMap[s.letterChoice] || 'keep';
    const rule = s.ruleStance === 'new' ? 'new' : 'old';

    let gachaKind = 'any';
    if (s.power.id === 'gacha_special') gachaKind = 'special';

    let effectivePower = powerId;
    if (powerId === 'gacha') effectivePower = 'gacha_' + gachaKind;

    const key = `${effectivePower}_${path}_${climax}_${dir}_${letter}_${rule}`;
    if (STORY.endings[key]) return Object.assign({ code: key }, STORY.endings[key]);

    // search for any ending matching power+path+climax prefix (loose match against the 20 signed verdicts)
    const prefix = `${effectivePower}_${path}_${climax}`;
    for (const k of Object.keys(STORY.endings)) {
      if (k.startsWith(prefix)) return Object.assign({ code: k }, STORY.endings[k]);
    }
    // fallback to power+path
    const prefix2 = `${effectivePower}_${path}`;
    for (const k of Object.keys(STORY.endings)) {
      if (k.startsWith(prefix2)) return Object.assign({ code: k }, STORY.endings[k]);
    }
    return Object.assign({ code: 'default' }, STORY.endings['default']);
  },

  getPriceDescription() {
    const p = State.current.power;
    if (p.id === 'zhishi') {
      if (p.path === 'petrify') return '镜中的你不再动了。每定住一样东西，镜里的你就少动一处。';
      return '某个存在在借你的眼睛看。你看穿别人的同时，它也在看。';
    }
    if (p.id === 'daida') {
      if (p.path === 'impersonate') return '你的名字，从今以后谁都能应一声。';
      return '规则收走了你的口头禅。那句说了十几年的话，此后只有沉默。';
    }
    if (p.id === 'zhefan') {
      if (p.path === 'delay') return '你欠的那一下，规则记账，从不过期。';
      return '你记住了每个人分到的那一份，清清楚楚，忘不掉。';
    }
    if (p.id === 'gacha_special') return '价格：关于"如何向左转"的全部生理本能。机器收走了你关于"如何向左转"的全部生理本能。';
    if (p.id === 'gacha') return '能力打了折，代价也轻。侥幸的代价是：你永远不知道自己本可以拥有什么。';
    return '无。';
  },
};

document.addEventListener('DOMContentLoaded', () => {
  Director.start();
});

window.addEventListener('popstate', () => { history.pushState(null, '', location.href); });
history.pushState(null, '', location.href);
</script>
